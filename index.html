<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Jeopardy Scorebook</title>
<meta name="theme-color" content="#0B1797">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Jeopardy">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --paper: #EBEEF4; --card: #FFFFFF; --ink: #17265E; --ink-soft: #5C6890;
    --line: #CCD3E2; --board: #0B1797; --gold: #B8810F; --gold-bright: #FFCC2E;
    --red: #C0392B; --red-soft: #F6E6E3; --good: #1F7A46; --good-soft: #E2EFE7;
  }
  body.dark {
    --paper: #0A0E1C; --card: #131A33; --ink: #E7ECF8; --ink-soft: #94A1C2;
    --line: #2A3358; --board: #0B1797; --gold: #F0C53C; --gold-bright: #FFD24D;
    --red: #E26452; --red-soft: #3A2329; --good: #4FB07A; --good-soft: #1B342A;
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(42,51,88,.5) 27px, rgba(42,51,88,.5) 28px);
  }
  * { box-sizing: border-box; }
  button, [data-act], .tab, .navbtn { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
  input, textarea { -webkit-user-select: text; user-select: text; }
  html, body { overscroll-behavior-y: none; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(204,211,226,.5) 27px, rgba(204,211,226,.5) 28px);
  }
  .wrap { max-width: 620px; margin: 0 auto; padding: 22px 14px 96px; }
  .disp { font-family: 'Arial Narrow', 'Helvetica Neue Condensed', Impact, sans-serif; text-transform: uppercase; letter-spacing: .08em; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }

  header { border-bottom: 3px double var(--ink); padding-bottom: 12px; margin-bottom: 14px; }
  .headrow { display: flex; align-items: center; justify-content: space-between; }
  header h1 { margin: 0; font-size: 30px; line-height: .95; letter-spacing: .05em; color: var(--ink); }
  header h1 .bang { color: var(--gold); }
  #themeBtn { background: none; border: 1.5px solid var(--ink); color: var(--ink); border-radius: 999px; width: 38px; height: 38px; cursor: pointer; font-size: 16px; }
  #verBadge { font-size: 10px; color: var(--ink-soft); line-height: 1; letter-spacing: .5px; margin-top: 4px; text-align: right; }

  .nav { display: flex; gap: 7px; margin: 14px 0 16px; }
  .navbtn { flex: 1; padding: 9px 2px; border: 1.5px solid var(--ink); border-radius: 6px; background: transparent; color: var(--ink); font-size: 11px; cursor: pointer; }
  .navbtn.active { background: var(--ink); color: var(--card); }

  /* board-style banner + score */
  .banner { background: var(--board); color: var(--gold-bright); text-align: center; border-radius: 6px;
    padding: 11px 8px; font-size: 22px; box-shadow: 3px 3px 0 var(--ink); border: 1.5px solid var(--ink);
    text-shadow: 1px 1px 0 rgba(0,0,0,.45); margin-bottom: 14px; }
  .scorehero { background: var(--board); border: 1.5px solid var(--ink); border-radius: 8px; box-shadow: 3px 3px 0 var(--ink);
    padding: 16px 12px 16px; text-align: center; margin-bottom: 16px; }
  .scorehero .round { color: var(--gold-bright); font-size: 19px; letter-spacing: .12em; opacity: .95; text-shadow: 1px 1px 0 rgba(0,0,0,.4); }
  .scorehero .amt { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 72px; line-height: .9; letter-spacing: .01em; color: var(--gold-bright); text-shadow: 2px 2px 0 rgba(0,0,0,.5); margin-top: 4px; }
  .scorehero .amt.neg { color: #FF8A7A; }
  .scorehero .sub { color: #C9D2FF; font-size: 12px; margin-top: 9px; font-style: italic; opacity: .9; }

  /* value buttons */
  .values { display: flex; flex-direction: column; gap: 9px; margin-bottom: 12px; }
  .valbtn { display: flex; align-items: center; justify-content: center; padding: 18px 4px; border: 1.5px solid var(--ink);
    border-radius: 7px; background: var(--board); color: var(--gold-bright); cursor: pointer;
    font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 30px; letter-spacing: .03em; box-shadow: 2px 2px 0 var(--ink); text-shadow: 1px 1px 0 rgba(0,0,0,.4); }
  .ddbtn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 15px 4px; border: 1.5px solid var(--ink);
    border-radius: 7px; background: var(--gold-bright); color: var(--board); cursor: pointer; margin-bottom: 14px;
    font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .12em; font-size: 17px; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }

  .tally { display: flex; align-items: center; justify-content: space-between; gap: 8px; font-size: 13px; color: var(--ink-soft);
    border: 1px dashed var(--line); border-radius: 6px; padding: 9px 12px; margin-bottom: 12px; font-style: italic; }
  .undo { background: none; border: none; color: var(--red); font-size: 12px; cursor: pointer; font-family: Georgia, serif; white-space: nowrap; }
  .undo:disabled { color: var(--ink-soft); opacity: .5; }

  .advance { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: none; border-radius: 6px;
    background: var(--ink); color: var(--card); font-size: 15px; cursor: pointer; box-shadow: 2px 2px 0 rgba(0,0,0,.25); }
  .ghostlink { display: block; width: 100%; text-align: center; background: none; border: none; color: var(--ink-soft); font-size: 12px;
    cursor: pointer; font-family: Georgia, serif; margin-top: 14px; text-decoration: underline; }
  .backlink { background: none; border: none; color: var(--ink-soft); font-size: 12px; cursor: pointer; font-family: Georgia, serif; text-decoration: underline; margin-bottom: 12px; padding: 0; }

  /* generic panel + fields */
  .panel { background: var(--card); border: 1.5px solid var(--ink); border-radius: 6px; padding: 14px; margin-bottom: 18px; box-shadow: 3px 3px 0 var(--ink); }
  label { display: block; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .08em; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  input { padding: 10px; border: 1px solid var(--line); border-radius: 4px; background: #fff; color: #17265E; font-family: Georgia, serif; font-size: 16px; width: 100%; }
  body.dark input { background: #0d1426; color: var(--ink); }
  .field { margin-bottom: 12px; }
  .catchips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .catchip { font-size: 13px; padding: 7px 12px; border-radius: 999px; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; font-family: Georgia, serif; }
  .catchip.on { background: var(--ink); color: var(--card); }
  .catchip:active { transform: scale(.96); }
  .wagerwrap { display: flex; gap: 8px; align-items: flex-end; }
  .wagerwrap .field { flex: 1; margin-bottom: 0; }
  .maxbtn { padding: 10px 12px; border: 1.5px solid var(--gold); background: transparent; color: var(--gold); border-radius: 4px; cursor: pointer; font-family: 'Arial Narrow', Impact, sans-serif; letter-spacing: .06em; font-size: 12px; white-space: nowrap; }
  .hintline { font-size: 11px; color: var(--ink-soft); font-style: italic; margin: 4px 0 0; }

  .rcbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 6px; }
  .rcbtn { padding: 18px 4px; border-radius: 7px; cursor: pointer; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase;
    letter-spacing: .06em; font-size: 18px; font-weight: 700; border: 1.5px solid; box-shadow: 2px 2px 0 var(--ink); }
  .rcbtn.right { border-color: var(--good); color: var(--good); background: var(--good-soft); }
  .rcbtn.wrong { border-color: var(--red); color: var(--red); background: var(--red-soft); }
  .rcbtn.sel.right { background: var(--good); color: #fff; }
  .rcbtn.sel.wrong { background: var(--red); color: #fff; }
  .posbtns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
  .posbtn { padding: 14px 2px; border: 1.5px solid var(--ink); border-radius: 7px; background: var(--card); color: var(--ink); cursor: pointer;
    font-family: 'Arial Narrow', Impact, sans-serif; font-size: 18px; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }
  .posbtn.sel { background: var(--board); color: var(--gold-bright); }
  .confirmmsg { font-size: 16px; line-height: 1.45; margin: 4px 0 16px; color: var(--ink); }
  .confirmrow { display: flex; gap: 10px; }
  .confirmrow button { flex: 1; padding: 14px 4px; border-radius: 7px; cursor: pointer; border: 1.5px solid var(--ink);
    font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .05em; font-size: 16px; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }
  .cbtn-no { background: transparent; color: var(--ink); }
  .cbtn-yes { background: var(--ink); color: var(--card); }
  .cbtn-yes.danger { background: var(--red); border-color: var(--red); color: #fff; }
  .confirmrow button:active { transform: scale(.97); }
  /* daily-double square picker */
  .sqbtns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .sqbtn { padding: 10px 2px; border: 1.5px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); cursor: pointer; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  body.dark .sqbtn { background: #0d1426; }
  .sqbtn.sel { background: var(--board); color: var(--gold-bright); border-color: var(--ink); }
  .sqbtn:active { transform: scale(.96); }
  /* game label */
  .glabel { font-size: 13px; color: var(--ink); font-style: italic; margin: 2px 0 2px; }
  /* edit screen */
  .editline { display: flex; align-items: center; gap: 8px; padding: 7px 2px; border-bottom: 1px dotted var(--line); }
  .editline:last-child { border-bottom: none; }
  .el-cat { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .el-amt { color: var(--ink-soft); font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  .el-res { border: 1.5px solid; border-radius: 5px; padding: 6px 10px; font-size: 12px; cursor: pointer; white-space: nowrap; font-family: 'Arial Narrow', Impact, sans-serif; letter-spacing: .04em; background: transparent; }
  .el-res.ok { border-color: var(--good); color: var(--good); } .el-res.no { border-color: var(--red); color: var(--red); }
  .el-x { background: none; border: none; color: var(--ink-soft); font-size: 16px; cursor: pointer; padding: 2px 4px; }
  .el-res:active, .el-x:active { transform: scale(.95); }
  /* records: paired Coryat boxes */
  .tworec { display: flex; gap: 10px; margin: 4px 0 4px; }
  .trbox { flex: 1; background: var(--card); border: 1.5px solid var(--ink); border-radius: 6px; box-shadow: 2px 2px 0 var(--ink); text-align: center; padding: 12px 6px; }
  .trn { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 30px; color: var(--gold); line-height: 1; }
  .trl { font-size: 11px; color: var(--ink-soft); letter-spacing: .12em; text-transform: uppercase; margin-top: 4px; }
  /* segmented toggle + trend */
  .seg { display: flex; border: 1.5px solid var(--ink); border-radius: 999px; overflow: hidden; margin-bottom: 12px; }
  .segbtn { flex: 1; padding: 8px 4px; border: none; background: transparent; color: var(--ink); font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
  .segbtn.active { background: var(--ink); color: var(--card); }
  .trendwrap { background: var(--card); border: 1.5px solid var(--ink); border-radius: 6px; box-shadow: 2px 2px 0 var(--ink); padding: 10px; margin-bottom: 4px; }
  /* new-record badges */
  .badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: -4px 0 16px; }
  .badge { background: var(--gold-bright); color: var(--board); border: 1.5px solid var(--ink); border-radius: 999px; padding: 7px 14px; box-shadow: 2px 2px 0 var(--ink);
    font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .06em; font-size: 13px; font-weight: 700; }
  /* Coryat benchmark */
  .benchwrap { margin: 6px 0 4px; }
  .benchbar { height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  .benchbar > i { display: block; height: 100%; background: var(--gold-bright); }
  .benchcap { font-size: 12px; color: var(--ink-soft); margin-top: 6px; font-style: italic; }
  .benchcap b { color: var(--gold); font-style: normal; }
  .oddsrow { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px dotted var(--line); font-size: 14px; }
  .oddsrow:last-of-type { border-bottom: none; }
  .oddsrow .mono { color: var(--ink-soft); }
  .oddsrow.you { background: var(--board); color: var(--gold-bright); border-radius: 6px; border-bottom: none; padding: 10px; margin: 3px 0; font-weight: 700; box-shadow: 2px 2px 0 var(--ink); }
  .oddsrow.you .mono { color: var(--gold-bright); }
  /* history filter bar */
  .filterbar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .daterow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .daterow label { margin: 0; }
  .daterow input[type=date] { flex: 1; min-width: 120px; }

  /* overlay sheet */
  #overlay { position: fixed; inset: 0; z-index: 50; background: rgba(11,23,151,.42); overflow: auto; padding: 16px 10px; display: flex; align-items: flex-start; justify-content: center; }
  #overlay.hidden, .hidden { display: none; }
  .sheet { background: var(--card); border: 2px solid var(--ink); border-radius: 8px; box-shadow: 5px 5px 0 var(--ink); width: 100%; max-width: 460px; margin-top: 4vh; padding: 16px; }
  .sheet-head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 3px double var(--ink); padding-bottom: 9px; margin-bottom: 12px; }
  .sheet-head .t { font-size: 22px; color: var(--gold); }
  .xbtn { background: none; border: none; color: var(--ink-soft); font-size: 22px; cursor: pointer; line-height: 1; padding: 0 4px; }

  /* history */
  .gcard { position: relative; background: var(--card); border: 1px solid var(--line); border-left: 5px solid var(--board); border-radius: 5px; padding: 13px 14px; margin-bottom: 12px; }
  .gcard .gtop { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .gcard .gscore { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 26px; color: var(--gold); letter-spacing: .02em; }
  .gcard .gscore.neg { color: var(--red); }
  .gcard .gdate { font-size: 12px; color: var(--ink-soft); }
  .gcard .gline { font-size: 13px; color: var(--ink-soft); margin-top: 4px; }
  .gcard .gfj { font-size: 12px; margin-top: 4px; }
  .gcard .gfj .ok { color: var(--good); } .gcard .gfj .no { color: var(--red); }
  .gdetail { margin-top: 10px; border-top: 1px dashed var(--line); padding-top: 8px; font-size: 12px; }
  .clue-line { display: flex; justify-content: space-between; gap: 8px; padding: 3px 0; border-bottom: 1px dotted var(--line); }
  .clue-line .cl-cat { color: var(--ink-soft); font-style: italic; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .clue-line .cl-val { font-family: ui-monospace, Menlo, monospace; white-space: nowrap; }
  .clue-line .ok { color: var(--good); } .clue-line .no { color: var(--red); }
  .gcardbtns { display: flex; gap: 16px; margin-top: 9px; }
  .gcardbtns button { background: none; border: none; font-size: 12px; cursor: pointer; padding: 0; font-family: Georgia, serif; }
  .gcardbtns .exp { color: var(--ink-soft); } .gcardbtns .del { color: var(--red); }

  /* stats + records */
  .statbig { text-align: center; margin-bottom: 16px; }
  .statbig .n { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 56px; line-height: 1; color: var(--gold); }
  .statbig .l { font-size: 12px; color: var(--ink-soft); letter-spacing: .14em; text-transform: uppercase; }
  .secthead { font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .1em; font-size: 14px; color: var(--ink);
    border-bottom: 2px solid var(--ink); padding-bottom: 4px; margin: 20px 0 8px; }
  .srow { display: grid; grid-template-columns: 1fr auto 56px; gap: 10px; align-items: center; padding: 7px 0; border-bottom: 1px dotted var(--line); font-size: 14px; }
  .srow .nm { color: var(--ink); }
  .srow .ct { font-size: 12px; color: var(--ink-soft); font-family: ui-monospace, Menlo, monospace; text-align: right; }
  .srow .pct { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; text-align: right; color: var(--gold); }
  .bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; grid-column: 1 / -1; margin-top: -2px; }
  .bar > i { display: block; height: 100%; background: var(--good); }
  .rec { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; padding: 10px 0; border-bottom: 1px dotted var(--line); }
  .rec .rlabel { font-size: 13px; color: var(--ink); }
  .rec .rsub { font-size: 11px; color: var(--ink-soft); font-style: italic; }
  .rec .rval { font-family: 'Arial Narrow', Impact, sans-serif; font-weight: 700; font-size: 20px; color: var(--gold); white-space: nowrap; }
  .rec .rval.neg { color: var(--red); }

  .empty { text-align: center; color: var(--ink-soft); padding: 44px 14px; font-style: italic; }
  .err { background: var(--red-soft); border: 1px solid var(--red); border-radius: 4px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px; color: var(--red); }
  .backup { text-align: center; margin-top: 30px; font-size: 12px; color: var(--ink-soft); }
  .backup button { background: none; border: none; color: var(--ink); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: Georgia, serif; padding: 4px; }
  #bkStatus { margin-top: 7px; font-size: 11px; }

  .valbtn:active, .ddbtn:active { transform: scale(.98); filter: brightness(.94); }
  .advance:active, .rcbtn:active, .maxbtn:active, .navbtn:active, .posbtn:active { transform: scale(.97); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="headrow">
      <h1 class="disp">Jeopardy <span class="bang">Scorebook</span></h1>
      <div style="display:flex;flex-direction:column;align-items:flex-end;flex:none">
        <button id="themeBtn">🌙</button>
        <span id="verBadge"></span>
      </div>
    </div>
  </header>

  <div class="nav">
    <button class="navbtn disp active" data-act="tab" data-tab="play">▶ Play</button>
    <button class="navbtn disp" data-act="tab" data-tab="history">📓 Games</button>
    <button class="navbtn disp" data-act="tab" data-tab="stats">📊 Stats</button>
    <button class="navbtn disp" data-act="tab" data-tab="records">🏆 Records</button>
  </div>

  <div id="err" class="err hidden">Couldn't save — your browser may be blocking storage (private browsing?). Progress will be lost when you close this page.</div>

  <main id="main"></main>

  <div class="backup">
    Your games live only on this device.<br>
    <button data-act="export">⬇ Back up to a file</button> ·
    <button data-act="import">⬆ Restore from backup</button>
    <input type="file" id="importFile" accept=".json,application/json" hidden>
    <div id="bkStatus" class="mono"></div>
  </div>
</div>

<div id="overlay" class="hidden"></div>

<script>
"use strict";
const APP_VERSION = "v7";
const GAMES_KEY = "jeop-scorebook-games";
const DRAFT_KEY = "jeop-scorebook-draft";
const THEME_KEY = "jeop-scorebook-theme";
const BK_KEY    = "jeop-scorebook-lastbackup";

const VALUES = { J: [200,400,600,800,1000], DJ: [400,800,1200,1600,2000] };
const ROUND_HIGH = { J: 1000, DJ: 2000 };
const ROUND_NEXT = { J: "DJ", DJ: "FJ" };
const ROUND_NAME = { J: "Jeopardy!", DJ: "Double Jeopardy!", FJ: "Final Jeopardy!" };
const CLUES_PER_ROUND = 30;                  // 6 categories x 5 clues per round
const POS_LABEL = { 1: "1st", 2: "2nd", 3: "3rd", 4: "4th" };
const CORYAT_BENCH = 20000;                  // rough Coryat of a strong / winning game

// ── storage ──
function load(k, def) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? def : v; } catch (e) { return def; } }
let games = load(GAMES_KEY, []);
let draft = load(DRAFT_KEY, null);          // in-progress game or null
let summary = null;                          // just-finished game (shown once)
let tab = "play";
let expanded = {};                           // history cards expanded
let editId = null, editGame = null;          // finished game being edited
let trendMetric = "coryat";                  // "coryat" | "score"
let histSearch = "", histPos = 0, histFrom = "", histTo = "";   // history filters
let wakeSentinel = null;                      // screen wake lock

function showErr() { document.getElementById("err").classList.remove("hidden"); }
function saveGames() { try { localStorage.setItem(GAMES_KEY, JSON.stringify(games)); document.getElementById("err").classList.add("hidden"); } catch (e) { showErr(); } }
function saveDraft() { try { draft ? localStorage.setItem(DRAFT_KEY, JSON.stringify(draft)) : localStorage.removeItem(DRAFT_KEY); } catch (e) { showErr(); } }

// ── money + math helpers ──
function money(n) { const neg = n < 0; const s = "$" + Math.abs(Math.round(n)).toLocaleString("en-US"); return neg ? "\u2212" + s : s; }
function clueAmount(c) { return c.dd ? (c.wager || 0) : (c.value || 0); }
function clueDelta(c) { return (c.correct ? 1 : -1) * clueAmount(c); }
function finalDelta(f) { return (f && f.played) ? (f.correct ? 1 : -1) * (f.wager || 0) : 0; }
function clueScore(g) { let s = 0; for (const c of g.clues) s += clueDelta(c); return s; }       // clues only
function scoreOf(g) { return clueScore(g) + finalDelta(g.final); }                                 // includes final
function correctCount(g) { let n = 0; for (const c of g.clues) if (c.correct) n++; if (g.final && g.final.played && g.final.correct) n++; return n; }
function attemptCount(g) { let n = g.clues.length; if (g.final && g.final.played) n++; return n; }
// Coryat: Daily Doubles scored at the board square's value (not the wager); Final Jeopardy ignored.
function coryatOf(g) { let s = 0; for (const c of g.clues) { const v = c.dd ? (c.square || 0) : (c.value || 0); s += (c.correct ? 1 : -1) * v; } return s; }
// Coryat -> single-game win probability. Logistic fit to The Jeopardy! Fan's historical
// model (2,000+ games): ~$3,200 floors near 1%, ~$28,000 ceils near 99%, ~$20,700 ~= 78%.
const CORYAT_C50 = 16000, CORYAT_S = 3700;
function winProbFromCoryat(c) {
  if (c <= 3200) return 0.01;
  if (c >= 28000) return 0.99;
  const p = 1 / (1 + Math.exp(-(c - CORYAT_C50) / CORYAT_S));
  return Math.max(0.01, Math.min(0.99, p));
}
function coryatForWinProb(p) { return CORYAT_C50 + CORYAT_S * Math.log(p / (1 - p)); }

function newDraft() { return { id: "g" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), date: new Date().toISOString(), round: "J", clues: [], final: null, position: null, label: "", cats: { J: [], DJ: [] } }; }
function pct(c, t) { return t ? Math.round(c / t * 100) : 0; }
function fmtDate(iso) { try { return new Date(iso).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); } catch (e) { return ""; } }

function scoreHero(label, score, sub) {
  return '<div class="scorehero"><div class="round disp">' + label + '</div>' +

    (sub ? '<div class="sub">' + sub + '</div>' : "") + '</div>';

function renderRound() {
  const r = draft.round, score = clueScore(draft);
  const roundClues = draft.clues.filter(c => c.round === r);
  const rc = roundClues.filter(c => c.correct).length;
  const rDelta = roundClues.reduce((a, c) => a + clueDelta(c), 0);
  let html = scoreHero(ROUND_NAME[r], score, roundClues.length + " of " + CLUES_PER_ROUND + " clues rung in");
  html += '<div class="values">';
  for (const v of VALUES[r]) html += '<button class="valbtn" data-act="value" data-v="' + v + '">$' + v.toLocaleString("en-US") + '</button>';
  html += '</div>';
  html += '<button class="ddbtn" data-act="dd">\u2605 Daily Double</button>';
  html += '<div class="tally"><span>This round: ' + rc + '/' + roundClues.length + ' right \u2022 ' + money(rDelta) + '</span>' +
    '<button class="undo" data-act="undo"' + (draft.clues.length ? "" : " disabled") + '>\u21A9 Undo last</button></div>';
  html += '<button class="advance disp" data-act="advance">Advance to ' + ROUND_NAME[ROUND_NEXT[r]] + ' \u2192</button>';
  html += '<button class="ghostlink" data-act="quit">Discard this game</button>';

}

function gameRecords(g) {
  const others = games.filter(x => x.id !== g.id);
  if (!others.length) return [];                            // first game: nothing to beat yet
  const maxBy = fn => others.reduce((m, x) => Math.max(m, fn(x)), -Infinity);
  const ddWon = gg => { let m = 0; for (const c of gg.clues) if (c.dd && c.correct) m = Math.max(m, c.wager || 0); return m; };
  const out = [];
  if (scoreOf(g) > maxBy(scoreOf)) out.push("Highest score");
  if (coryatOf(g) > maxBy(coryatOf)) out.push("Best Coryat");
  if (correctCount(g) > maxBy(correctCount)) out.push("Most correct");
  const myDD = ddWon(g);
  if (myDD > 0 && myDD > maxBy(ddWon)) out.push("Biggest DD won");
  return out;
}
function renderSummary() {
  const g = summary, score = scoreOf(g), cc = correctCount(g), at = attemptCount(g);
  let html = scoreHero("Game Over \u2022 Final Score", score, g.label ? esc(g.label) : "");

  else if (recs.length) html += '<div class="badges">' + recs.map(r => '<span class="badge">\u2605 ' + r + '</span>').join("") + '</div>';
  html += '<div class="panel" style="text-align:center">';

  html += '<div style="margin-top:10px;font-size:15px">Coryat score: <b style="color:var(--gold)">' + money(coryatOf(g)) + '</b></div>';

}

function commitClue(correct) {
  const ctx = sheetCtx, r = ctx.round;
  const cat = (document.getElementById("sCat").value || "").trim();
  const ans = (document.getElementById("sAns").value || "").trim();
  const clue = { round: r, value: ctx.dd ? null : ctx.value, dd: !!ctx.dd, wager: null, square: null, correct: correct, cat, ans };
  if (ctx.dd) {
    let w = parseInt((document.getElementById("sWager").value || "0").replace(/[^0-9]/g, ""), 10) || 0;
    const maxW = Math.max(clueScore(draft), ROUND_HIGH[r]);
    w = Math.min(Math.max(w, 5), maxW);
    clue.wager = w;
    clue.square = ctx.square || VALUES[r][2];
  }
  draft.clues.push(clue);
  if (cat) { if (!draft.cats) draft.cats = { J: [], DJ: [] }; if (!draft.cats[r]) draft.cats[r] = []; if (!draft.cats[r].includes(cat)) draft.cats[r].push(cat); }
  saveDraft();
  closeSheet();
  render();
}

// ── HISTORY ──
function gameMatches(g, q) {
  if ((g.label || "").toLowerCase().includes(q)) return true;
  for (const c of g.clues) if ((c.cat || "").toLowerCase().includes(q) || (c.ans || "").toLowerCase().includes(q)) return true;
  if (g.final && ((g.final.cat || "").toLowerCase().includes(q) || (g.final.ans || "").toLowerCase().includes(q))) return true;
  return false;
}
function renderHistory() {
  if (!games.length) { main.innerHTML = '<div class="empty">No games yet.<br>Finish a game and it lands here.</div>'; return; }
  let html = '<div class="filterbar">';
  html += '<input id="histSearch" placeholder="Search label, category, or response\u2026" value="' + esc(histSearch) + '">';
  html += '<div class="seg" style="margin:0">';
  const segs = [[0, "All"], [1, "1st"], [2, "2nd"], [3, "3rd"], [4, "4th"]];
  for (const [p, lbl] of segs) html += '<button class="segbtn' + (histPos === p ? " active" : "") + '" data-act="hist-pos" data-p="' + p + '">' + lbl + '</button>';
  html += '</div>';
  html += '<div class="daterow"><label>From</label><input id="histFrom" type="date" value="' + esc(histFrom) + '">' +
    '<label>To</label><input id="histTo" type="date" value="' + esc(histTo) + '"></div>';
  if (histSearch || histPos || histFrom || histTo) html += '<button class="ghostlink" style="margin:6px 0 0" data-act="hist-clear">Clear filters</button>';
  html += '</div><div id="histList"></div>';
  main.innerHTML = html;
  renderHistList();
}
function renderHistList() {
  const el = document.getElementById("histList");
  if (!el) return;
  let list = games.slice();
  const q = histSearch.trim().toLowerCase();
  if (q) list = list.filter(g => gameMatches(g, q));
  if (histPos) list = list.filter(g => g.position === histPos);
  if (histFrom) list = list.filter(g => (g.finishedAt || g.date).slice(0, 10) >= histFrom);
  if (histTo) list = list.filter(g => (g.finishedAt || g.date).slice(0, 10) <= histTo);
  list.sort((a, b) => (b.finishedAt || b.date).localeCompare(a.finishedAt || a.date));
  const filtering = q || histPos || histFrom || histTo;
  let html = '';
  if (filtering) html += '<p class="hintline" style="margin:0 0 10px">Showing ' + list.length + ' of ' + games.length + ' games</p>';
  if (!list.length) { el.innerHTML = html + '<div class="empty" style="padding:24px 10px">No games match those filters.</div>'; return; }
  for (const g of list) {
    const score = scoreOf(g), cc = correctCount(g), at = attemptCount(g);
    html += '<div class="gcard"><div class="gtop">' +
      '<span class="gscore' + (score < 0 ? " neg" : "") + '">' + money(score) + (g.position ? ' <span style="font-size:13px;color:var(--ink-soft)">\u00B7 ' + POS_LABEL[g.position] + '</span>' : "") + '</span>' +
      '<span class="gdate">' + fmtDate(g.finishedAt || g.date) + '</span></div>';
    if (g.label) html += '<div class="glabel">' + esc(g.label) + '</div>';
    html += '<div class="gline">' + cc + '/' + at + ' correct \u2022 ' + pct(cc, at) + '% \u2022 Coryat ' + money(coryatOf(g)) + '</div>';
    if (g.final && g.final.played)
      html += '<div class="gfj">Final: <span class="' + (g.final.correct ? "ok" : "no") + '">' + (g.final.correct ? "got it" : "missed") + ' ' + money(finalDelta(g.final)) + '</span></div>';
    if (expanded[g.id]) html += gameDetailHTML(g);
    html += '<div class="gcardbtns"><button class="exp" data-act="toggle-game" data-id="' + g.id + '">' + (expanded[g.id] ? "Hide clues" : "Show clues") + '</button>' +
      '<button class="exp" data-act="edit-game" data-id="' + g.id + '">Edit</button>' +
      '<button class="del" data-act="del-game" data-id="' + g.id + '">Delete</button></div>';

function gameDetailHTML(g) {
  let h = '<div class="gdetail">';
  let cur = "";
  for (const c of g.clues) {
    if (c.round !== cur) { cur = c.round; h += '<div class="disp" style="font-size:11px;color:var(--ink-soft);margin:6px 0 2px">' + ROUND_NAME[c.round] + '</div>'; }
    const amt = c.dd ? ("DD " + money(c.wager)) : ("$" + c.value);
    h += '<div class="clue-line"><span class="cl-cat">' + (c.cat ? esc(c.cat) : (c.dd ? "Daily Double" : "—")) + (c.ans ? ' \u00B7 ' + esc(c.ans) : "") + '</span>' +
      '<span class="cl-val ' + (c.correct ? "ok" : "no") + '">' + (c.correct ? "\u2713" : "\u2717") + ' ' + amt + '</span></div>';

  }
  h += '</div>';
  return h;
}

function computeStats() {
  const overall = { c: 0, t: 0 };
  const round = { J: { c: 0, t: 0 }, DJ: { c: 0, t: 0 }, FJ: { c: 0, t: 0 } };
  const val = {};                                          // keyed "J-200", "DJ-DD", "FJ", etc.
  const answered = { J: 0, DJ: 0, FJ: 0 };
  const pos = { 1: 0, 2: 0, 3: 0, 4: 0 }; let posN = 0;
  const bump = (o, ok) => { o.t++; if (ok) o.c++; };
  for (const g of games) {
    for (const c of g.clues) {
      bump(overall, c.correct); bump(round[c.round], c.correct); answered[c.round]++;
      const key = c.round + "-" + (c.dd ? "DD" : c.value);
      (val[key] = val[key] || { c: 0, t: 0 }); bump(val[key], c.correct);
    }
    if (g.final && g.final.played) { bump(overall, g.final.correct); bump(round.FJ, g.final.correct); answered.FJ++; (val.FJ = val.FJ || { c: 0, t: 0 }); bump(val.FJ, g.final.correct); }
    if (g.position) { pos[g.position]++; posN++; }
  }
  const N = games.length;
  const coverage = {
    J: { a: answered.J, p: N * CLUES_PER_ROUND },
    DJ: { a: answered.DJ, p: N * CLUES_PER_ROUND },
    FJ: { a: answered.FJ, p: N },
    all: { a: answered.J + answered.DJ + answered.FJ, p: N * (CLUES_PER_ROUND * 2 + 1) }
  };
  return { overall, round, val, coverage, pos, posN };
}
function statRow(name, o, indent) {
  const pad = indent ? ' style="padding-left:14px"' : "";
  if (!o || !o.t) return '<div class="srow"><span class="nm"' + pad + '>' + name + '</span><span class="ct">no data</span><span class="pct">—</span></div>';
  const p = pct(o.c, o.t);
  return '<div class="srow"><span class="nm"' + pad + '>' + name + '</span><span class="ct">' + o.c + '/' + o.t + '</span><span class="pct">' + p + '%</span>' +
    '<span class="bar"><i style="width:' + p + '%"></i></span></div>';
}
function covRow(name, o) {
  const p = o.p ? Math.min(100, Math.round(o.a / o.p * 100)) : 0;
  const missed = Math.max(0, o.p - o.a);
  return '<div class="srow"><span class="nm">' + name + '</span><span class="ct">' + o.a + '/' + o.p + ' \u2022 ' + missed + ' not rung</span><span class="pct">' + p + '%</span>' +
    '<span class="bar"><i style="width:' + p + '%;background:var(--gold-bright)"></i></span></div>';
}
function trendSVG(vals) {
  const W = 320, H = 96, pad = 8;
  const min = Math.min(0, ...vals), max = Math.max(0, ...vals), span = (max - min) || 1;
  const x = i => pad + (vals.length === 1 ? (W - 2 * pad) / 2 : i * (W - 2 * pad) / (vals.length - 1));
  const y = v => pad + (1 - (v - min) / span) * (H - 2 * pad);
  const zeroY = y(0).toFixed(1);
  const pts = vals.map((v, i) => x(i).toFixed(1) + "," + y(v).toFixed(1)).join(" ");
  const dots = vals.map((v, i) => '<circle cx="' + x(i).toFixed(1) + '" cy="' + y(v).toFixed(1) + '" r="2.8" fill="var(--gold)"/>').join("");
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;height:auto;display:block" preserveAspectRatio="none">' +
    '<line x1="' + pad + '" y1="' + zeroY + '" x2="' + (W - pad) + '" y2="' + zeroY + '" stroke="var(--line)" stroke-width="1" stroke-dasharray="3 3"/>' +
    (vals.length > 1 ? '<polyline points="' + pts + '" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>' : "") +
    dots + '</svg>';
}
function renderStats() {
  if (!games.length) { main.innerHTML = '<div class="empty">No stats yet.<br>Play a game to start tracking.</div>'; return; }
  const s = computeStats();
  let html = '<div class="statbig"><div class="n">' + pct(s.overall.c, s.overall.t) + '%</div><div class="l">overall correct</div></div>';
  html += '<p class="hintline" style="text-align:center;margin:-8px 0 4px">' + games.length + ' game' + (games.length === 1 ? "" : "s") + ' \u2022 ' + s.overall.t + ' clue' + (s.overall.t === 1 ? "" : "s") + ' rung in</p>';

  // recent trend
  const ordered = games.slice().sort((a, b) => (a.finishedAt || a.date).localeCompare(b.finishedAt || b.date)).slice(-15);
  const vals = ordered.map(g => trendMetric === "coryat" ? coryatOf(g) : scoreOf(g));
  html += '<div class="secthead">Recent trend</div>';
  html += '<div class="seg"><button class="segbtn' + (trendMetric === "coryat" ? " active" : "") + '" data-act="trend-metric" data-m="coryat">Coryat</button>' +
    '<button class="segbtn' + (trendMetric === "score" ? " active" : "") + '" data-act="trend-metric" data-m="score">Final score</button></div>';
  if (vals.length < 2) html += '<p class="hintline">Play at least 2 games to see a trend.</p>';
  else { html += '<div class="trendwrap">' + trendSVG(vals) + '</div>'; html += '<p class="hintline" style="text-align:center">last ' + vals.length + ' games \u2022 oldest \u2192 newest \u2022 ' + money(vals[vals.length - 1]) + ' latest</p>'; }

  html += '<div class="secthead">Accuracy by round &amp; value</div>';
  html += statRow("Jeopardy!", s.round.J);
  for (const v of VALUES.J) html += statRow("$" + v.toLocaleString("en-US"), s.val["J-" + v], true);
  html += statRow("Daily Double", s.val["J-DD"], true);
  html += statRow("Double Jeopardy!", s.round.DJ);
  for (const v of VALUES.DJ) html += statRow("$" + v.toLocaleString("en-US"), s.val["DJ-" + v], true);
  html += statRow("Daily Double", s.val["DJ-DD"], true);
  html += statRow("Final Jeopardy!", s.round.FJ);

  html += '<div class="secthead">Ring-in rate <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--ink-soft)">(of a 61-clue game)</span></div>';
  html += covRow("Whole game", s.coverage.all);
  html += covRow("Jeopardy! board", s.coverage.J);
  html += covRow("Double Jeopardy! board", s.coverage.DJ);
  html += covRow("Final Jeopardy!", s.coverage.FJ);

  html += '<div class="secthead">Finishing position</div>';
  if (!s.posN) html += '<div class="srow"><span class="nm">No positions recorded yet</span><span class="ct"></span><span class="pct"></span></div>';
  else {
    const winRate = Math.round(s.pos[1] / s.posN * 100);
    const avgFinish = ((s.pos[1] * 1 + s.pos[2] * 2 + s.pos[3] * 3 + s.pos[4] * 4) / s.posN).toFixed(1);
    html += '<div class="tworec"><div class="trbox"><div class="trn">' + winRate + '%</div><div class="trl">win rate</div></div>' +
      '<div class="trbox"><div class="trn">' + avgFinish + '</div><div class="trl">avg finish</div></div></div>';
    for (const p of [1, 2, 3, 4]) html += statRow(POS_LABEL[p] + " place", { c: s.pos[p], t: s.posN });
  }
  main.innerHTML = html;
}

// ── RECORDS ──
function computeRecords() {
  let career = 0, coryatSum = 0, bestCoryat = null;
  let bestE = null, worstE = null, bestC = null, worstC = null, ddWon = null, ddLost = null;
  const ordered = games.slice().sort((a, b) => (a.finishedAt || a.date).localeCompare(b.finishedAt || b.date));
  let runR = 0, runW = 0, longestR = 0, longestW = 0;        // answer streaks run across games
  const posStreak = { 1: 0, 2: 0, 3: 0, 4: 0 }, posCur = { 1: 0, 2: 0, 3: 0, 4: 0 };
  let anyPos = false;
  for (const g of ordered) {
    const sc = scoreOf(g), cc = correctCount(g), cor = coryatOf(g);
    career += sc; coryatSum += cor;
    if (!bestE || sc > bestE.v) bestE = { v: sc, g };
    if (!worstE || sc < worstE.v) worstE = { v: sc, g };
    if (!bestC || cc > bestC.v) bestC = { v: cc, g };
    if (!worstC || cc < worstC.v) worstC = { v: cc, g };
    if (!bestCoryat || cor > bestCoryat.v) bestCoryat = { v: cor, g };
    const seq = g.clues.map(c => c.correct);
    if (g.final && g.final.played) seq.push(g.final.correct);
    for (const ok of seq) {
      if (ok) { runR++; runW = 0; if (runR > longestR) longestR = runR; }
      else { runW++; runR = 0; if (runW > longestW) longestW = runW; }
    }
    for (const c of g.clues) if (c.dd) {
      if (c.correct) { if (!ddWon || c.wager > ddWon.v) ddWon = { v: c.wager, g }; }
      else { if (!ddLost || c.wager > ddLost.v) ddLost = { v: c.wager, g }; }
    }
    if (g.position) anyPos = true;
    for (const p of [1, 2, 3, 4]) {
      if (g.position === p) { posCur[p]++; if (posCur[p] > posStreak[p]) posStreak[p] = posCur[p]; }
      else posCur[p] = 0;
    }
  }
  return { career, coryatAvg: games.length ? Math.round(coryatSum / games.length) : 0, bestCoryat, bestE, worstE, bestC, worstC, longestR, longestW, ddWon, ddLost, posStreak, anyPos };
}
function recRow(label, valHTML, sub, neg) {
  return '<div class="rec"><div><div class="rlabel">' + label + '</div>' + (sub ? '<div class="rsub">' + sub + '</div>' : "") + '</div>' +
    '<div class="rval' + (neg ? " neg" : "") + '">' + valHTML + '</div></div>';
}
function renderRecords() {
  if (!games.length) { main.innerHTML = '<div class="empty">No records yet.<br>Your bests and worsts show up here.</div>'; return; }
  const r = computeRecords();
  const d = x => x && x.g ? fmtDate(x.g.finishedAt || x.g.date) : "";
  let html = '<div class="statbig"><div class="n">' + money(r.career) + '</div><div class="l">career winnings</div></div>';
  html += '<div class="tworec"><div class="trbox"><div class="trn">' + money(r.coryatAvg) + '</div><div class="trl">avg Coryat</div></div>' +
    '<div class="trbox"><div class="trn">' + money(r.bestCoryat.v) + '</div><div class="trl">best Coryat</div></div></div>';
  const benchPct = Math.max(0, Math.min(100, Math.round(r.coryatAvg / CORYAT_BENCH * 100)));
  html += '<div class="benchwrap"><div class="benchbar"><i style="width:' + benchPct + '%"></i></div>' +
    '<div class="benchcap">Your average Coryat is <b>' + benchPct + '%</b> of a strong game (~' + money(CORYAT_BENCH) + ', a rough winning-level benchmark).</div></div>';

  // Win odds by Coryat (modeled on The Jeopardy! Fan's historical curve)
  html += '<div class="secthead">Win odds by Coryat</div>';
  const myC = r.coryatAvg, myP = Math.round(winProbFromCoryat(myC) * 100);
  let posN = 0, wins = 0;
  for (const g of games) if (g.position) { posN++; if (g.position === 1) wins++; }
  html += '<p class="hintline" style="margin:0 0 10px">At your average Coryat (' + money(myC) + '), the model gives about <b style="color:var(--gold);font-style:normal">' + myP + '%</b> to win a game' +
    (posN ? ' \u2014 your actual win rate so far is ' + Math.round(wins / posN * 100) + '%' : '') + '.</p>';
  const rows = [90, 80, 70, 60, 50, 40, 30, 20, 10].map(p => ({ p, c: coryatForWinProb(p / 100), you: false }));
  rows.push({ p: myP, c: myC, you: true });
  rows.sort((a, b) => b.c - a.c);
  for (const row of rows) {
    html += '<div class="oddsrow' + (row.you ? " you" : "") + '"><span>' + (row.you ? "Your avg \u2014 about " + row.p + "%" : row.p + "% to win") + '</span>' +
      '<span class="mono">' + money(Math.round(row.c / 100) * 100) + '</span></div>';
  }
  html += '<p class="benchcap">Estimated from The Jeopardy! Fan\u2019s model of 2,000+ games \u2014 a rough guide for a player on the show, not a guarantee.</p>';

  html += '<div class="secthead">Best</div>';
  html += recRow("Top game by earnings", money(r.bestE.v), d(r.bestE), r.bestE.v < 0);
  html += recRow("Most correct in a game", r.bestC.v + "", d(r.bestC));
  html += recRow("Longest correct streak", r.longestR + "", "consecutive right answers, across games");
  html += recRow("Biggest Daily Double won", r.ddWon ? money(r.ddWon.v) : "—", r.ddWon ? d(r.ddWon) : "none yet");
  html += '<div class="secthead">Worst</div>';
  html += recRow("Lowest game by earnings", money(r.worstE.v), d(r.worstE), r.worstE.v < 0);
  html += recRow("Fewest correct in a game", r.worstC.v + "", d(r.worstC));
  html += recRow("Longest incorrect streak", r.longestW + "", "consecutive misses, across games");
  html += recRow("Biggest Daily Double lost", r.ddLost ? money(r.ddLost.v) : "—", r.ddLost ? d(r.ddLost) : "none yet");
  html += '<div class="secthead">Finish streaks</div>';
  if (!r.anyPos) html += recRow("No positions recorded yet", "—", "mark where you placed after Final");
  else for (const p of [1, 2, 3, 4]) html += recRow("Longest " + POS_LABEL[p] + "-place streak", r.posStreak[p] + "", "games in a row");
  main.innerHTML = html;
}

// ── utilities ──
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

// ── event delegation ──
document.addEventListener("click", ev => {
  const el = ev.target.closest("[data-act]");
  if (!el) return;
  const act = el.dataset.act;

  if (act === "tab") { if (editId) return; tab = el.dataset.tab; render(); return; }
  if (act === "trend-metric") { trendMetric = el.dataset.m; render(); return; }
  if (act === "newgame") { summary = null; draft = newDraft(); saveDraft(); tab = "play"; render(); return; }
  if (act === "quit") { askConfirm("Discard this game? Nothing will be saved.", "Discard", true, () => { draft = null; saveDraft(); render(); }); return; }
  if (act === "value") { openClueSheet({ round: draft.round, value: parseInt(el.dataset.v, 10), dd: false }); return; }
  if (act === "dd") { openClueSheet({ round: draft.round, dd: true }); return; }
  if (act === "sheet-cancel") { closeSheet(); return; }
  if (act === "sheet-result") { commitClue(el.dataset.r === "1"); return; }
  if (act === "catchip") {
    const inp = document.getElementById("sCat"); if (inp) inp.value = el.dataset.cat;
    document.querySelectorAll(".catchip").forEach(c => c.classList.toggle("on", c === el));
    return;
  }
  if (act === "dd-true") { const r = draft.round; document.getElementById("sWager").value = Math.max(clueScore(draft), ROUND_HIGH[r]); return; }
  if (act === "dd-square") { if (sheetCtx) sheetCtx.square = parseInt(el.dataset.sq, 10); document.querySelectorAll(".sqbtn").forEach(b => b.classList.toggle("sel", b === el)); return; }
  if (act === "undo") { if (draft.clues.length) { draft.clues.pop(); saveDraft(); render(); } return; }
  if (act === "advance") {
    const next = ROUND_NEXT[draft.round];
    askConfirm("Advance to " + ROUND_NAME[next] + "? You can step back if needed.", "Advance", false, () => { draft.round = next; saveDraft(); render(); });
    return;
  }
  if (act === "back") { draft.round = "DJ"; draft.final = null; saveDraft(); render(); return; }
  if (act === "fj-max") { const max = Math.max(clueScore(draft), 0); document.getElementById("fjWager").value = max; return; }
  if (act === "fj-result") { stageFinal(el.dataset.r === "1"); render(); return; }
  if (act === "position") { captureFinalDraft(); draft.position = parseInt(el.dataset.p, 10); saveDraft(); render(); return; }
  if (act === "finish") { finishGame(); return; }
  if (act === "skip-finish") { draft.final = { played: false, wager: 0, correct: null, cat: "", ans: "" }; finishGame(true); return; }
  if (act === "toggle-game") { expanded[el.dataset.id] = !expanded[el.dataset.id]; if (tab === "history" && !editId) renderHistList(); else render(); return; }
  if (act === "del-game") { const id = el.dataset.id; askConfirm("Delete this game permanently?", "Delete", true, () => { games = games.filter(g => g.id !== id); saveGames(); if (tab === "history" && !editId) renderHistList(); else render(); }); return; }
  if (act === "hist-pos") { histPos = +el.dataset.p; document.querySelectorAll('[data-act="hist-pos"]').forEach(b => b.classList.toggle("active", +b.dataset.p === histPos)); renderHistList(); return; }
  if (act === "hist-clear") { histSearch = ""; histPos = 0; histFrom = ""; histTo = ""; renderHistory(); return; }
  if (act === "edit-game") { const src = games.find(g => g.id === el.dataset.id); if (src) { editId = src.id; editGame = JSON.parse(JSON.stringify(src)); render(); } return; }
  if (act === "edit-flip") { captureEditInputs(); const c = editGame.clues[+el.dataset.i]; if (c) c.correct = !c.correct; render(); return; }
  if (act === "edit-del") { captureEditInputs(); editGame.clues.splice(+el.dataset.i, 1); render(); return; }
  if (act === "edit-fj") {
    captureEditInputs();
    const prev = editGame.final || { cat: "", ans: "" };
    if (el.dataset.r === "x") editGame.final = { played: false, wager: 0, correct: null, cat: prev.cat || "", ans: prev.ans || "" };
    else { const fw = document.getElementById("edFjWager"); const w = fw ? Math.max(0, parseInt((fw.value || "0").replace(/[^0-9]/g, ""), 10) || 0) : (prev.wager || 0); editGame.final = { played: true, wager: w, correct: el.dataset.r === "1", cat: prev.cat || "", ans: prev.ans || "" }; }
    render(); return;
  }
  if (act === "edit-pos") { captureEditInputs(); const p = +el.dataset.p; editGame.position = (editGame.position === p ? null : p); render(); return; }
  if (act === "edit-save") { captureEditInputs(); const i = games.findIndex(g => g.id === editId); if (i >= 0) games[i] = editGame; saveGames(); editId = null; editGame = null; tab = "history"; render(); return; }
  if (act === "edit-cancel") { editId = null; editGame = null; tab = "history"; render(); return; }
  if (act === "confirm-yes") { const cb = pendingConfirm; pendingConfirm = null; closeSheet(); if (cb) cb(); return; }
  if (act === "confirm-no") { pendingConfirm = null; closeSheet(); return; }
  if (act === "export") { doExport(); return; }
  if (act === "import") { document.getElementById("importFile").click(); return; }
});

// in-app confirmation popup (native confirm() is suppressed in some installed-PWA contexts)
let pendingConfirm = null;
function askConfirm(msg, yesLabel, danger, onYes) {
  pendingConfirm = onYes;
  overlay.innerHTML = '<div class="sheet" style="max-width:380px;margin-top:18vh">' +
    '<p class="confirmmsg">' + esc(msg) + '</p>' +
    '<div class="confirmrow"><button class="cbtn-no" data-act="confirm-no">Cancel</button>' +
    '<button class="cbtn-yes' + (danger ? " danger" : "") + '" data-act="confirm-yes">' + esc(yesLabel) + '</button></div></div>';
  overlay.classList.remove("hidden");
}

function readFinalFields() {
  const cat = (document.getElementById("fjCat") || {}).value || "";
  const ans = (document.getElementById("fjAns") || {}).value || "";
  let w = parseInt(((document.getElementById("fjWager") || {}).value || "0").replace(/[^0-9]/g, ""), 10) || 0;
  const maxW = Math.max(clueScore(draft), 0);
  w = Math.min(Math.max(w, 0), maxW);
  return { cat: cat.trim(), ans: ans.trim(), wager: w };
}
function stageFinal(correct) {
  captureLabel();
  const f = readFinalFields();
  draft.final = { played: true, wager: f.wager, correct, cat: f.cat, ans: f.ans };
  saveDraft();
}
function captureLabel() { const el = document.getElementById("fjLabel"); if (el) draft.label = (el.value || "").trim(); }
function captureFinalDraft() {
  if (!document.getElementById("fjWager")) return;            // not on the Final screen
  captureLabel();
  const f = readFinalFields();
  const prev = draft.final && draft.final.played === true ? draft.final : null;
  draft.final = { played: !!prev, wager: f.wager, correct: prev ? prev.correct : null, cat: f.cat, ans: f.ans };
}
function finishGame(skipped) {
  captureLabel();
  if (skipped) { doFinish(); return; }
  if (!draft.final || draft.final.played !== true) {
    askConfirm("No Final Jeopardy result selected. Finish without playing Final?", "Finish", false, () => {
      const f = readFinalFields();
      draft.final = { played: false, wager: 0, correct: null, cat: f.cat, ans: f.ans };
      doFinish();
    });
    return;
  }
  const f = readFinalFields();                              // capture any edited cat/ans/wager
  draft.final = { played: true, wager: f.wager, correct: draft.final.correct, cat: f.cat, ans: f.ans };
  doFinish();
}
function doFinish() {
  draft.finishedAt = new Date().toISOString();
  games.push(draft);
  saveGames();
  summary = draft;
  draft = null;
  saveDraft();
  tab = "play";
  render();
}

// ── theme ──
let theme = load(THEME_KEY, null) === "dark" ? "dark" : "light";
function applyTheme() {
  document.body.classList.toggle("dark", theme === "dark");
  document.getElementById("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
  document.querySelector('meta[name="theme-color"]').setAttribute("content", "#0B1797");
}
document.getElementById("themeBtn").addEventListener("click", () => {
  theme = theme === "dark" ? "light" : "dark";
  try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
  applyTheme();
});
applyTheme();

// ── backup / restore ──
function today() { const d = new Date(); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
function markBackedUp() { try { localStorage.setItem(BK_KEY, String(Date.now())); } catch (e) {} refreshBackupStatus(); }
function refreshBackupStatus() {
  const el = document.getElementById("bkStatus"); if (!el) return;
  let last = 0; try { last = parseInt(localStorage.getItem(BK_KEY)) || 0; } catch (e) {}
  if (!games.length) { el.textContent = ""; return; }
  el.textContent = last ? "Last backup: " + fmtDate(new Date(last).toISOString()) : "Not backed up yet";
}
function notify(msg, bad) {
  const el = document.getElementById("bkStatus");
  if (!el) return;
  el.textContent = msg;
  el.style.color = bad ? "var(--red)" : "var(--good)";
  setTimeout(() => { el.style.color = ""; refreshBackupStatus(); }, 4000);
}
async function doExport() {
  const fname = "jeopardy-scorebook-" + today() + ".json";
  const payload = JSON.stringify({ app: "jeopardy-scorebook", version: 1, exported: new Date().toISOString(), games, prefs: { theme } }, null, 2);
  const blob = new Blob([payload], { type: "application/json" });
  try {
    const file = new File([blob], fname, { type: "application/json" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], title: "Jeopardy Scorebook backup" }); markBackedUp(); return; }
  } catch (err) { if (err && err.name === "AbortError") return; }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  markBackedUp();
  notify("Backup saved as " + fname);
}
document.getElementById("importFile").addEventListener("change", ev => {
  const file = ev.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const incoming = Array.isArray(data) ? data : (data.games || []);
      if (!Array.isArray(incoming)) throw new Error("bad");
      const have = new Set(games.map(g => g.id));
      let added = 0;
      for (const g of incoming) if (g && g.id && !have.has(g.id)) { games.push(g); have.add(g.id); added++; }
      saveGames(); render();
      notify(added + " game" + (added === 1 ? "" : "s") + " restored.");
    } catch (e) { notify("That file doesn't look like a backup.", true); }
    ev.target.value = "";
  };
  reader.readAsText(file);
});

// ── live history filtering (typing must not re-render the bar / drop focus) ──
document.addEventListener("input", ev => {
  const t = ev.target;
  if (t.id === "histSearch") { histSearch = t.value; renderHistList(); }
  else if (t.id === "histFrom") { histFrom = t.value; renderHistList(); }
  else if (t.id === "histTo") { histTo = t.value; renderHistList(); }
});

// ── keep the screen awake during a game ──
async function manageWake() {
  const want = ((!!draft && !summary) || !!editId) && document.visibilityState === "visible";
  try {
    if (want && "wakeLock" in navigator && !wakeSentinel) {
      wakeSentinel = await navigator.wakeLock.request("screen");
      wakeSentinel.addEventListener("release", () => { wakeSentinel = null; });
    } else if (!want && wakeSentinel) {
      const s = wakeSentinel; wakeSentinel = null; await s.release();
    }
  } catch (e) { wakeSentinel = null; }
}

// ── version badge + boot ──
document.getElementById("verBadge").textContent = APP_VERSION;
render();

// ── service worker (offline once installed) ──
if ("serviceWorker" in navigator && location.protocol === "https:") {
  const hadController = !!navigator.serviceWorker.controller;
  let reloaded = false;
  navigator.serviceWorker.addEventListener("controllerchange", () => { if (!hadController || reloaded) return; reloaded = true; location.reload(); });
  navigator.serviceWorker.register("./sw.js", { updateViaCache: "none" }).then(reg => { reg.update(); setInterval(() => { try { reg.update(); } catch (e) {} }, 30 * 60 * 1000); }).catch(() => {});
}

// freeze in-progress game before the tab can be discarded; manage wake lock across visibility changes
window.addEventListener("pagehide", () => { if (draft) saveDraft(); });
document.addEventListener("visibilitychange", () => { if (document.visibilityState === "hidden" && draft) saveDraft(); manageWake(); });
</script>
